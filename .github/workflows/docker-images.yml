name: Build and Push Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.projects.outputs.result }}
      has_changes: ${{ fromJSON(steps.projects.outputs.result).folders[0] != null }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Locate Docker images to build
        id: projects
        uses: actions/github-script@v9
        with:
          retries: 3
          script: |
            const fs = require('fs');
            const path = require('path');

            const workspace = process.env.GITHUB_WORKSPACE;
            const projects = fs.readdirSync(workspace, { withFileTypes: true })
              .filter((entry) => entry.isDirectory())
              .map((entry) => entry.name)
              .filter((folder) =>
                fs.existsSync(path.join(workspace, folder, 'Dockerfile')) &&
                fs.existsSync(path.join(workspace, folder, '.version'))
              )
              .sort();

            const { owner, repo } = context.repo;
            const { data: account } = await github.rest.users.getByUsername({
              username: owner,
            });
            const isOrganization = account.type === 'Organization';
            const route = isOrganization
              ? 'GET /orgs/{org}/packages/{package_type}/{package_name}/versions'
              : 'GET /users/{username}/packages/{package_type}/{package_name}/versions';
            const targets = [];

            for (const folder of projects) {
              const version = fs.readFileSync(
                path.join(workspace, folder, '.version'),
                'utf8'
              ).split(/\r?\n/).find((line) => line.trim())?.trim();

              if (!version) {
                throw new Error(`${folder}/.version is empty`);
              }

              const params = {
                package_type: 'container',
                package_name: `${repo}/${folder}`,
                per_page: 100,
                ...(isOrganization ? { org: owner } : { username: owner }),
              };
              let versions;

              try {
                versions = await github.paginate(route, params);
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                versions = [];
              }

              const hasTag = (packageVersion, tag) =>
                packageVersion.metadata?.container?.tags?.includes(tag);
              const versionPackage = versions.find((item) => hasTag(item, version));
              const latestPackage = versions.find((item) => hasTag(item, 'latest'));

              if (!versionPackage) {
                core.info(`${folder}: ${version} tag is not published`);
                targets.push(folder);
              } else if (!latestPackage || versionPackage.id !== latestPackage.id) {
                core.info(`${folder}: latest does not point to ${version}`);
                targets.push(folder);
              } else {
                core.info(`${folder}: ${version} is already published`);
              }
            }

            return { folders: targets };

      - name: Summary
        env:
          MATRIX: ${{ steps.projects.outputs.result }}
        run: |
          if [ "${{ fromJSON(steps.projects.outputs.result).folders[0] != null }}" = "true" ]; then
            echo "### 🐳 Docker images to build" >> $GITHUB_STEP_SUMMARY
            echo "$MATRIX" | jq -r '.folders[]' | while read -r dir; do
              echo "- $dir" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "### ℹ️ All Docker images are current" >> $GITHUB_STEP_SUMMARY
          fi

  build_and_push:
    needs: prepare
    if: needs.prepare.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: ${{ fromJson(needs.prepare.outputs.matrix).folders }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: read_version
        run: |
          # Read the first non-empty line from .version, remove leading/trailing whitespace
          VERSION=$(sed '/^[[:space:]]*$/d' "${{ matrix.folder }}/.version" | head -n 1 | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building ${{ matrix.folder }} version $VERSION"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.folder }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.folder }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.read_version.outputs.version }}
          # We tag the image with 'latest' and the content from .version
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.folder }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.folder }}:${{ steps.read_version.outputs.version }}
